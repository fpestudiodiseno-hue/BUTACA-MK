<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Butaca MK - Galería</title>

    <link rel="stylesheet" href="galeria.css">

</head>

<body>

<div class="contenedor">

    <!-- ====================================== -->
    <!-- MENU SUPERIOR -->
    <!-- ====================================== -->

    <nav class="tabs">

        <button class="tab-btn"
                data-tab="cinefilos">
                CINEFILOS
        </button>

        <button class="tab-btn"
                data-tab="inspiracion">
                INSPIRACIÓN
        </button>

        <button class="tab-btn"
                data-tab="expediente">
                EXPEDIENTE
        </button>

        <button class="tab-btn"
                data-tab="proceso">
                PROCESO
        </button>

        <button class="tab-btn"
                data-tab="modelado3d">
                MODELO 3D
        </button>

        <button class="tab-btn"
                data-tab="sobremi">
                SOBRE MI
        </button>

    </nav>

    <!-- ====================================== -->
    <!-- SLIDER PRINCIPAL -->
    <!-- ====================================== -->

    <section class="slider-container">

        <button class="flecha izquierda">
            ❮
        </button>

        <img id="sliderImage"
             src=""
             alt="">

        <button class="flecha derecha">
            ❯
        </button>

        <!-- INDICADORES -->

        <div id="dots"
             class="dots">

        </div>

    </section>

</div>

<script src="galeria.js"></script>

</body>

</html>
